services:
  db:
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/src/generated
    ports:
      - "3001:3000"
    env_file: .env.dev
    environment:
      # Dev server optimizations
      - TURBOPACK_DISABLED=true
      - NODE_OPTIONS=--max-old-space-size=512
      - NEXT_SKIP_ENV_VALIDATION=false
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 800M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
